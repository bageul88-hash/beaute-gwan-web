<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOCURI Admin · 고객등급 · 포인트 · 문자</title>
<style>
  :root{
    --red:#d61f3a; --green:#6fa52d; --green-soft:#8dc63f;
    --cream:#f7f3ec; --paper:#fffdf8; --ink:#2c2018; --ink-soft:#7a6a59; --line:#ece3d3;
    --espresso:#1c1611; --espresso-2:#272019; --brass:#cda24c;
    --teal:#3792a0; --gray:#9b9183; --amber:#e0922e; --purple:#9b6fd6;
    --font:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--font);background:var(--cream);color:var(--ink);display:flex;min-height:100vh;font-size:14px;}

  .side{width:230px;flex:0 0 230px;background:var(--espresso);color:#e9ddca;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;padding:20px 18px;border-bottom:1px solid rgba(205,162,76,.18);}
  .brand .logo{width:40px;height:40px;border-radius:50%;overflow:hidden;background:#fff;margin-right:11px;flex:0 0 auto;box-shadow:0 3px 8px rgba(0,0,0,.4);}
  .brand .logo img{width:104%;height:104%;object-fit:cover;transform:translate(-2%,-2%);}
  .brand b{font-size:15px;color:#fff;line-height:1.2;}
  .brand small{display:block;color:var(--brass);font-size:11px;letter-spacing:.12em;}
  nav{padding:12px 10px;flex:1;}
  .nav-item{display:flex;align-items:center;width:100%;border:none;background:none;color:#cdbfa8;padding:12px 13px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;text-align:left;margin-bottom:3px;font-family:var(--font);}
  .nav-item .ic{width:20px;margin-right:11px;text-align:center;}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
  .nav-item.active{background:var(--red);color:#fff;}
  .side-foot{padding:14px 18px;border-top:1px solid rgba(205,162,76,.18);font-size:12px;color:#8c7c66;}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;}
  .topbar h1{margin:0;font-size:20px;font-weight:800;}
  .topbar .who{font-size:13px;color:var(--ink-soft);}
  .topbar .who b{color:var(--ink);}
  .content{padding:24px 28px 50px;}
  .view{display:none;}
  .view.active{display:block;animation:fade .2s;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;}
  .btn{border:none;border-radius:11px;padding:10px 16px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--font);}
  .btn.red{background:var(--red);color:#fff;}.btn.dark{background:var(--espresso);color:#fff;}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}.btn.green{background:var(--green);color:#fff;}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px;}
  .btn:active{transform:translateY(1px);}
  h2.sec{font-size:16px;margin:0 0 14px;font-weight:800;}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;}
  .stat{padding:18px;}
  .stat .lab{font-size:12.5px;color:var(--ink-soft);font-weight:600;}
  .stat .num{font-size:28px;font-weight:800;margin-top:6px;}
  .stat .num small{font-size:14px;color:var(--ink-soft);margin-left:3px;}
  .stat .tg{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
  .search{flex:1;max-width:300px;border:1px solid var(--line);background:#fff;border-radius:11px;padding:11px 14px;font-size:14px;font-family:var(--font);}
  table{width:100%;border-collapse:collapse;background:var(--paper);border-radius:16px;overflow:hidden;}
  th,td{padding:13px 16px;text-align:left;font-size:13.5px;border-bottom:1px solid var(--line);}
  th{background:#f3ece0;font-size:12.5px;color:var(--ink-soft);font-weight:700;}
  tr:last-child td{border-bottom:none;}
  .mono{font-variant-numeric:tabular-nums;}
  .pts{font-weight:800;color:var(--green);}
  .tier{display:inline-block;font-size:11.5px;font-weight:800;padding:4px 11px;border-radius:20px;color:#fff;}

  .tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .tcard{padding:20px;border-top:4px solid;}
  .tcard h3{margin:0 0 4px;font-size:18px;}
  .tcard .cnt{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
  .tcard .field{margin-bottom:11px;}
  .tcard .field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
  .tcard .field input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:13.5px;font-family:var(--font);}

  /* sms */
  .smswrap{display:grid;grid-template-columns:1fr 360px;gap:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:700;margin:0 0 7px;}
  .inp{width:100%;border:1px solid var(--line);background:#fff;border-radius:11px;padding:12px 13px;font-size:14px;font-family:var(--font);}
  textarea.inp{resize:vertical;min-height:120px;}
  select.inp{appearance:none;}
  .targets{display:flex;flex-wrap:wrap;gap:8px;}
  .tg-btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;}
  .tg-btn .d{width:10px;height:10px;border-radius:3px;margin-right:7px;}
  .tg-btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .vars{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .vars code{background:#f0e9dd;padding:2px 6px;border-radius:5px;color:var(--red);font-weight:700;}
  .preview{background:#eef4ff;border:1px solid #d3e0fb;border-radius:13px;padding:14px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;color:#26344f;}
  .count-note{font-size:13px;margin:0 0 12px;}.count-note b{color:var(--red);font-size:16px;}
  .lunchrow{display:flex;align-items:center;justify-content:space-between;background:#f3ece0;border-radius:11px;padding:12px 14px;margin:14px 0;}
  .toggle{position:relative;width:44px;height:25px;border-radius:20px;background:#d8cdbb;cursor:pointer;transition:.2s;flex:0 0 auto;}
  .toggle.on{background:var(--green-soft);}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .toggle.on::after{left:22px;}
  .logs .lg{display:flex;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--line);font-size:13px;}
  .logs .lg:last-child{border-bottom:none;}

  .overlay{position:fixed;inset:0;background:rgba(28,22,17,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:var(--paper);border-radius:20px;width:100%;max-width:420px;box-shadow:0 30px 70px rgba(0,0,0,.4);}
  .modal .mh{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .modal .mh h3{margin:0;font-size:17px;}.modal .mh .x{border:none;background:none;font-size:24px;cursor:pointer;color:var(--ink-soft);}
  .modal .mb{padding:20px 22px;}.modal .mf{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
  .adj{display:flex;gap:8px;margin-bottom:14px;}
  .adj button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-weight:700;cursor:pointer;font-family:var(--font);font-size:13px;}
  .adj button.on{background:var(--ink);color:#fff;border-color:var(--ink);}

  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:30px;font-size:13.5px;font-weight:700;opacity:0;transition:.3s;z-index:80;pointer-events:none;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:900px){
    body{flex-direction:column;}.side{width:100%;flex:none;height:auto;flex-direction:row;align-items:center;overflow-x:auto;}
    nav{display:flex;padding:8px;}.nav-item{white-space:nowrap;margin:0 3px;}.side-foot,.brand small{display:none;}
    .stats,.tiers{grid-template-columns:1fr 1fr;}.smswrap{grid-template-columns:1fr;}
  }
</style>
</head>

<script>
(function(){
  "use strict";
  var $=function(s,r){return (r||document).querySelector(s);};
  var $$=function(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));};

  /* ---- tiers ---- */
  var tiers=[
    {key:"basic",name:"일반",min:0,color:"#9b9183",benefit:"기본 적립 1배"},
    {key:"reg",  name:"단골",min:100,color:"#3792a0",benefit:"적립 1.5배 + 생일 쿠폰"},
    {key:"vip",  name:"VIP", min:300,color:"#cda24c",benefit:"적립 2배 + 사이즈업 무료"}
  ];
  function tierOf(p){var t=tiers[0],i;for(i=0;i<tiers.length;i++){if(p>=tiers[i].min)t=tiers[i];}return t;}

  var CATS=["한시적 할인","신규 원두 무료 맛보기","와인 행사","공간 임대 행사","기타 행사"];

  var members=[
    {id:1,name:"김서연",phone:"010-2345-6789",points:340,attend:18},
    {id:2,name:"박지훈",phone:"010-9876-5432",points:60,attend:3},
    {id:3,name:"이수민",phone:"010-1122-3344",points:520,attend:26},
    {id:4,name:"최도윤",phone:"010-5566-7788",points:20,attend:1},
    {id:5,name:"정하은",phone:"010-3344-5566",points:150,attend:9},
    {id:6,name:"강민준",phone:"010-7788-9900",points:90,attend:5},
    {id:7,name:"유성영",phone:"010-5653-7788",points:210,attend:12},
    {id:8,name:"한지우",phone:"010-2211-4455",points:30,attend:2}
  ];
  var logs=[
    {title:"VIP 와인 페어링 초대",count:2,sent:"2026-06-15 14:10"},
    {title:"단골 생일 쿠폰 안내",count:3,sent:"2026-06-13 11:05"}
  ];

  var titles={dash:"대시보드",customers:"고객 관리",tiers:"등급 관리",sms:"행사 문자"};
  function go(v){
    $$(".nav-item").forEach(function(b){b.classList.toggle("active",b.dataset.view===v);});
    $$(".view").forEach(function(s){s.classList.toggle("active",s.id===v);});
    $("#pageTitle").textContent=titles[v];
  }
  $$(".nav-item").forEach(function(b){b.onclick=function(){go(b.dataset.view);};});

  /* ---- dashboard ---- */
  function tierCount(t){var n=0,i;for(i=0;i<members.length;i++)if(tierOf(members[i].points).key===t.key)n++;return n;}
  function renderDash(){
    var totalP=0,i;for(i=0;i<members.length;i++)totalP+=members[i].points;
    var st=$("#dashStats");st.innerHTML="";
    var cards=[
      {lab:"총 고객",num:members.length+"<small>명</small>",c:"#d61f3a"},
      {lab:"총 발행 포인트",num:totalP.toLocaleString()+"<small>P</small>",c:"#6fa52d"},
      {lab:"VIP 고객",num:tierCount(tiers[2])+"<small>명</small>",c:"#cda24c"},
      {lab:"이번달 발송 문자",num:"192<small>건</small>",c:"#9b6fd6"}
    ];
    cards.forEach(function(c){
      var d=document.createElement("div");d.className="card stat";d.style.borderTop="3px solid "+c.c;
      d.innerHTML="<div class='lab'>"+c.lab+"</div><div class='num'>"+c.num+"</div>";
      st.appendChild(d);
    });
    var bars=$("#dashBars");bars.innerHTML="";
    tiers.forEach(function(t){
      var n=tierCount(t),pct=Math.round(n/members.length*100);
      var row=document.createElement("div");row.style.margin="12px 0";
      row.innerHTML="<div style='display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px'>"+
        "<span><span class='tier' style='background:"+t.color+"'>"+t.name+"</span></span><span class='mono'>"+n+"명 ("+pct+"%)</span></div>"+
        "<div style='height:10px;background:#efe6d4;border-radius:6px;overflow:hidden'><div style='height:100%;width:"+pct+"%;background:"+t.color+"'></div></div>";
      bars.appendChild(row);
    });
  }

  /* ---- customers ---- */
  function renderCust(){
    var q=$("#custSearch").value.trim();
    var tb=$("#custBody");tb.innerHTML="";
    members.filter(function(m){return !q||m.name.indexOf(q)>=0||m.phone.indexOf(q)>=0;}).forEach(function(m){
      var t=tierOf(m.points);
      var tr=document.createElement("tr");
      tr.innerHTML="<td><b>"+m.name+"</b></td><td class='mono'>"+m.phone+"</td>"+
        "<td><span class='tier' style='background:"+t.color+"'>"+t.name+"</span></td>"+
        "<td class='pts'>"+m.points+"P</td><td class='mono'>"+m.attend+"회</td>"+
        "<td style='text-align:right'><button class='btn ghost sm' data-pt='"+m.id+"'>포인트 조정</button></td>";
      tb.appendChild(tr);
    });
    $$("[data-pt]",tb).forEach(function(b){b.onclick=function(){openPoint(+b.dataset.pt);};});
  }
  $("#custSearch").oninput=renderCust;

  /* ---- point modal ---- */
  var pmId=null,pmMode="add";
  function byId(id){return members.filter(function(x){return x.id===id;})[0];}
  function openPoint(id){
    pmId=id;pmMode="add";var m=byId(id);
    $("#pmName").textContent=m.name+" 님 포인트 조정";
    $$("#ovPoint .adj button").forEach(function(b){b.classList.toggle("on",b.dataset.mode==="add");});
    $("#pmAmt").value="10";$("#pmReason").value="";
    updatePm();$("#ovPoint").classList.add("show");
  }
  function updatePm(){
    var m=byId(pmId);var amt=parseInt($("#pmAmt").value)||0;
    var after=pmMode==="add"?m.points+amt:Math.max(0,m.points-amt);
    var t=tierOf(after);
    $("#pmCur").textContent=m.points;$("#pmAfter").textContent=after;
    $("#pmTier").innerHTML="등급 <b style='color:"+t.color+"'>"+t.name+"</b>";
  }
  $$("#ovPoint .adj button").forEach(function(b){b.onclick=function(){pmMode=b.dataset.mode;$$("#ovPoint .adj button").forEach(function(x){x.classList.toggle("on",x===b);});updatePm();};});
  $("#pmAmt").oninput=updatePm;
  $("#pmSave").onclick=function(){
    var m=byId(pmId);var amt=parseInt($("#pmAmt").value)||0;
    m.points=pmMode==="add"?m.points+amt:Math.max(0,m.points-amt);
    closeAll();renderCust();renderDash();
    toast(m.name+"님 포인트 "+(pmMode==="add"?"+":"-")+amt+"P → "+m.points+"P ("+tierOf(m.points).name+")");
  };

  /* ---- tiers ---- */
  function renderTiers(){
    var g=$("#tierCards");g.innerHTML="";
    tiers.forEach(function(t,i){
      var d=document.createElement("div");d.className="card tcard";d.style.borderTopColor=t.color;
      d.innerHTML="<h3 style='color:"+t.color+"'>"+t.name+"</h3><div class='cnt'>현재 "+tierCount(t)+"명</div>"+
        "<div class='field'><label>등급명</label><input value='"+t.name+"' data-f='name' data-i='"+i+"'></div>"+
        "<div class='field'><label>기준 누적 포인트 (이상)</label><input value='"+t.min+"' data-f='min' data-i='"+i+"' inputmode='numeric'></div>"+
        "<div class='field'><label>혜택</label><input value='"+t.benefit.replace(/'/g,"&#39;")+"' data-f='benefit' data-i='"+i+"'></div>";
      g.appendChild(d);
    });
    $$("#tierCards input").forEach(function(inp){inp.oninput=function(){
      var t=tiers[+inp.dataset.i],f=inp.dataset.f;
      if(f==="min")t.min=parseInt(inp.value)||0; else t[f]=inp.value;
    };});
  }
  $("#saveTiers").onclick=function(){tiers.sort(function(a,b){return a.min-b.min;});renderTiers();renderDash();renderCust();toast("등급 설정이 저장되었습니다 (시안)");};

  /* ---- sms ---- */
  var selTiers={basic:true,reg:true,vip:true};
  function renderSmsTargets(){
    var t=$("#smsTargets");t.innerHTML="";
    var all=document.createElement("button");all.className="tg-btn"+(allOn()?" on":"");all.textContent="전체";
    all.onclick=function(){var v=!allOn();tiers.forEach(function(x){selTiers[x.key]=v;});renderSmsTargets();updateSms();};
    t.appendChild(all);
    tiers.forEach(function(x){
      var b=document.createElement("button");b.className="tg-btn"+(selTiers[x.key]?" on":"");
      b.innerHTML="<span class='d' style='background:"+x.color+"'></span>"+x.name;
      b.onclick=function(){selTiers[x.key]=!selTiers[x.key];renderSmsTargets();updateSms();};
      t.appendChild(b);
    });
  }
  function allOn(){return tiers.every(function(x){return selTiers[x.key];});}
  function targetMembers(){return members.filter(function(m){return selTiers[tierOf(m.points).key];});}
  function fillCat(){var s=$("#smsCat");s.innerHTML="";CATS.forEach(function(c){var o=document.createElement("option");o.textContent=c;s.appendChild(o);});}
  function updateSms(){
    var tm=targetMembers();
    $("#smsCount").textContent=tm.length;
    var m=tm[0]||members[0];var t=tierOf(m.points);
    var txt=$("#smsBody").value.replace(/\{이름\}/g,m.name).replace(/\{등급\}/g,t.name).replace(/\{포인트\}/g,m.points+"P");
    $("#smsPreview").textContent=txt;
  }
  $("#smsBody").oninput=updateSms;
  $("#smsLunch").onclick=function(){this.classList.toggle("on");};
  $("#sendSms").onclick=function(){
    var n=targetMembers().length;
    if(!n)return toast("받는 등급을 하나 이상 선택하세요");
    logs.unshift({title:$("#smsCat").value+" 안내",count:n,sent:"2026-06-16 "+new Date().toTimeString().slice(0,5)});
    renderLogs();toast(n+"명에게 발송되었습니다 (시안)");
  };
  function renderLogs(){
    var l=$("#smsLogs");l.innerHTML="";
    logs.forEach(function(g){var d=document.createElement("div");d.className="lg";
      d.innerHTML="<span><b>"+g.title+"</b> · "+g.count+"건</span><span style='color:var(--ink-soft)'>"+g.sent+"</span>";l.appendChild(d);});
  }

  function closeAll(){$$(".overlay").forEach(function(o){o.classList.remove("show");});}
  $$("[data-close]").forEach(function(b){b.onclick=closeAll;});
  $$(".overlay").forEach(function(o){o.onclick=function(e){if(e.target===o)closeAll();};});
  var tt=null;window.toast=function(m){var t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(function(){t.classList.remove("show");},2200);};

  renderDash();renderCust();renderTiers();fillCat();renderSmsTargets();updateSms();renderLogs();
})();
</script>
</body>
</html>
